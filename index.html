<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Files</title>
</head>
<body>

<h1>Files</h1>
<ul id="file-list"></ul>

<script>
const owner = "MartienvdB";
const repo = "custom-dnd-characters";

fetch(`https://api.github.com/repos/${owner}/${repo}/contents`)
    .then(response => response.json())
    .then(files => {
        const list = document.getElementById("file-list");

        files
            .filter(file =>
                file.type === "file" &&
                file.name.endsWith(".html") &&
                file.name !== "index.html"
            )
            .forEach(file => {
                const li = document.createElement("li");

                const link = document.createElement("a");
                link.href = file.name;
                link.textContent = file.name;

                li.appendChild(link);
                list.appendChild(li);
            });
    })
    .catch(error => {
        document.getElementById("file-list").innerHTML =
            "<li>Failed to load file list</li>";

        console.error(error);
    });
</script>

</body>
</html>
